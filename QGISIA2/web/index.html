  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QGISAI+ - Assistant IA pour QGIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Anti-FOUC: apply theme before React loads to prevent flash of wrong background
      (function () {
        try {
          var stored = localStorage.getItem("geoai-settings");
          var theme = "dark";
          if (stored) {
            try { theme = JSON.parse(stored).theme || "dark"; } catch (e) {}
          }
          if (theme === "auto") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          var html = document.documentElement;
          if (theme === "light") {
            html.classList.remove("dark");
            html.style.backgroundColor = "#ffffff";
            html.style.color = "#1f2937";
          } else {
            html.classList.add("dark");
            html.style.backgroundColor = "#131314";
            html.style.color = "#e3e3e3";
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = "#131314";
        }
      })();
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.qt && window.qt.webChannelTransport) {
          const script = document.createElement("script");
          script.src = "qrc:///qtwebchannel/qwebchannel.js";
          script.onload = function () {
            new QWebChannel(window.qt.webChannelTransport, function (channel) {
              window.qgis = channel.objects.qgis;
              console.log("QGIS Bridge initialized");
            });
          };
          document.head.appendChild(script);
        }
      });
    </script>
